<title>M.N. Teas Investment — Material Order</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:#1b4f72;color:#fff;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:17px;font-weight:600;color:#fff}
.progress-bar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#185FA5;border-radius:2px;transition:width .3s}
.page-title{font-size:20px;font-weight:600;margin-bottom:.25rem;color:#fff}
.page-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:1.5rem}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#fff;margin:1.25rem 0 .6rem;padding-bottom:.35rem;border-bottom:1px solid rgba(255,255,255,.3)}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
.field label{font-size:13px;color:#fff;font-weight:500}
.field input[type=text],.field input[type=number],.field select{padding:9px 12px;border:1px solid #a8b8c4;border-radius:8px;font-size:14px;font-family:inherit;background:#dde6ec;color:#1a2a3a;width:100%}
.field input:focus,.field select:focus{outline:none;border-color:#378ADD}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.check-group{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#c8d4dc;border:1px solid #a8b8c4;border-radius:8px;cursor:pointer;transition:all .15s;color:#1a2a3a}
.check-item:hover{border-color:#185FA5;background:#b8c8d4}
.check-item input[type=checkbox]{width:17px;height:17px;accent-color:#185FA5;flex-shrink:0}
.check-item label{font-size:14px;cursor:pointer;flex:1;color:#1a2a3a}
.room-card{background:#c8d4dc;border:1px solid #a8b8c4;border-radius:10px;padding:1rem;margin-bottom:1rem;color:#1a2a3a}
.room-card-title{font-size:13px;font-weight:600;color:#1a3d5c;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #a8b8c4}
/* Material table */
.mat-table{width:100%;border-collapse:collapse}
.mat-table th{font-size:13px;color:#1a2a3a;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:7px 8px;border-bottom:2px solid #8aacbc;text-align:left;background:#b0bec8}
.mat-table th:nth-child(2),.mat-table th:nth-child(3){text-align:center}
.mat-table th:last-child{text-align:right}
.mat-table td{padding:7px 6px;border-bottom:1px solid #a8b8c4;vertical-align:middle;font-size:13px;color:#1a2a3a}
.mat-table tr:last-child td{border-bottom:none}
.mat-table input[type=number]{padding:5px 7px;border:1px solid #a8b8c4;border-radius:6px;font-size:13px;font-family:inherit;background:#dde6ec;width:70px;text-align:center;color:#1a2a3a}
.mat-table input[type=number]:focus{outline:none;border-color:#185FA5;background:#eef4f8}
.mat-table input[type=text]{padding:5px 7px;border:1px solid #a8b8c4;border-radius:6px;font-size:12px;font-family:inherit;background:#dde6ec;width:100%;color:#1a2a3a}
.mat-table input[type=text]:focus{outline:none;border-color:#378ADD;background:#fff}
.mat-table select{padding:5px 6px;border:1px solid #a8b8c4;border-radius:6px;font-size:12px;font-family:inherit;background:#dde6ec;width:100%;color:#1a2a3a}
.mat-table select:focus{outline:none;border-color:#185FA5}
.unit-tag{font-size:11px;color:#6a8a9a;display:block;margin-top:1px}
.cost-input{padding:5px 7px;border:1px solid #a8b8c4;border-radius:6px;font-size:13px;font-family:inherit;background:#dde6ec;width:80px;text-align:right;color:#1a2a3a}
.cost-input:focus{outline:none;border-color:#378ADD;background:#fff}
.color-input{padding:4px 7px;border:1px solid #a8b8c4;border-radius:6px;font-size:12px;font-family:inherit;background:#dde6ec;width:110px;color:#1a2a3a}
.color-input:focus{outline:none;border-color:#378ADD;background:#fff}
.misc-section{margin-top:.75rem;padding-top:.75rem;border-top:1px solid #f0f0f0}
.misc-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.misc-row input[type=text]{flex:2;padding:6px 9px;border:1px solid #a8b8c4;border-radius:6px;font-size:13px;font-family:inherit;background:#dde6ec;color:#1a2a3a}
.misc-row input[type=number]{width:70px;padding:6px 7px;border:1px solid #a8b8c4;border-radius:6px;font-size:13px;font-family:inherit;background:#dde6ec;text-align:center;color:#1a2a3a}
.misc-row select{flex:1;padding:6px 7px;border:1px solid #a8b8c4;border-radius:6px;font-size:12px;font-family:inherit;background:#dde6ec;color:#1a2a3a}
.misc-row input:focus,.misc-row select:focus{outline:none;border-color:#378ADD;background:#fff}
.misc-row button{padding:5px 10px;border:1px solid #a8b8c4;background:#dde6ec;border-radius:6px;font-size:13px;cursor:pointer;color:#c0392b}
.misc-row button:hover{background:#fee;color:#c00;border-color:#fcc}
.add-misc-btn{font-size:13px;color:#fff;background:rgba(255,255,255,.15);border:1px dashed rgba(255,255,255,.5);border-radius:6px;padding:6px 14px;cursor:pointer;margin-top:4px}
.add-misc-btn:hover{background:rgba(255,255,255,.25)}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.3)}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;border:1px solid #a8b8c4;background:#dde6ec;color:#1a2a3a;transition:all .15s}
.btn:hover{background:#c8d4dc}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0c447c}
.btn.sm{padding:6px 14px;font-size:13px;}
.step-indicator{font-size:12px;color:rgba(255,255,255,.8)}
.supplier-block{background:#c8d4dc;border:1px solid #a8b8c4;border-radius:10px;margin-bottom:1rem;overflow:hidden}
.supplier-header{background:#b0bec8;padding:.75rem 1rem;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;color:#1a2a3a}
.supplier-total{font-size:13px;color:#185FA5;font-weight:600}
.master-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;padding:8px 1rem;border-bottom:1px solid #a8b8c4;font-size:13px;align-items:center;color:#1a2a3a}
.master-row:last-child{border-bottom:none}
.master-row.hdr{font-size:11px;color:#1a2a3a;font-weight:600;text-transform:uppercase;background:#b8c8d4;letter-spacing:.04em}
.grand-total-bar{background:#185FA5;color:#fff;border-radius:10px;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.grand-total-bar .lbl{font-size:13px;opacity:.85}
.grand-total-bar .val{font-size:22px;font-weight:600}
.export-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.empty-msg{font-size:13px;color:rgba(255,255,255,.7);padding:1.5rem;text-align:center}
.color-badge{display:inline-block;font-size:11px;color:#185FA5;background:#e8f0fb;border-radius:4px;padding:1px 6px;margin-left:4px}
@media(max-width:540px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}}
@media print{.nav-bar,.export-bar,.add-misc-btn,.header button{display:none}.app{padding:.5rem}}

// ── STATE ─────────────────────────────────────────────────────────────────────
let state={
  address:'',sqft:0,beds:1,fullBaths:1,halfBaths:0,
  hasOffice:false,hasGarage:false,garageSize:1,kitchenOpen:false,hasDining:false,
  hasExterior:false,hasLandscape:false,
  majorSystems:{roof:false,foundation:false,ac:false,electrical:false,plumbing:false,waterHeater:false},
  materials:{},  // pageId+matId -> {qty, color, supplier, unitCost}
  misc:{},       // pageId -> [{name,qty,unit,supplier,unitCost}]
  roomSqft:{},   // pageId -> sqft
  roomHeight:{},  // pageId -> ceiling height
  supplies:{},    // sup id -> {qty, supplier, unitCost}
};
let pages=[];
let currentPage=0;

function buildPages(){
  pages=[];
  pages.push({id:'property',title:'Property Info',icon:'🏠',type:'property'});
  pages.push({id:'general',title:'General / Whole House & Living Areas',icon:'🔨',type:'materials',mats:GENERAL_MATERIALS});
  pages.push({id:'kitchen',title:'Kitchen',icon:'🍳',type:'materials',mats:KITCHEN_MATERIALS});
  pages.push({id:'bath-master',title:'Master Bathroom',icon:'🚿',type:'materials',mats:BATH_MATERIALS});
  for(let i=1;i<state.fullBaths;i++) pages.push({id:'bath-'+i,title:'Guest Bath '+i,icon:'🛁',type:'materials',mats:BATH_MATERIALS});
  for(let i=1;i<=state.halfBaths;i++) pages.push({id:'halfbath-'+i,title:'Half Bath '+i,icon:'🚽',type:'materials',mats:BATH_MATERIALS.slice(0,7)});
  pages.push({id:'bed-master',title:'Master Bedroom',icon:'🛏',type:'bedroom',mats:BEDROOM_MATERIALS});
  for(let i=1;i<state.beds;i++) pages.push({id:'bed-'+i,title:'Bedroom '+i,icon:'🛏',type:'bedroom',mats:BEDROOM_MATERIALS});
  if(state.hasOffice) pages.push({id:'office',title:'Office',icon:'💼',type:'bedroom',mats:BEDROOM_MATERIALS});
  if(state.hasGarage) pages.push({id:'garage',title:'Garage',icon:'🚗',type:'garage',mats:GARAGE_MATERIALS});
  if(state.hasExterior) pages.push({id:'exterior',title:'Exterior',icon:'🏡',type:'materials',mats:EXTERIOR_MATERIALS});
  if(state.hasLandscape) pages.push({id:'landscape',title:'Landscaping',icon:'🌿',type:'materials',mats:LANDSCAPE_MATERIALS});
  if(Object.values(state.majorSystems).some(v=>v)) pages.push({id:'systems',title:'Major Systems',icon:'⚙️',type:'materials',mats:SYSTEMS_MATERIALS});
  pages.push({id:'misc-supplies',title:'Jobsite Supplies',icon:'🧰',type:'supplies'});
  pages.push({id:'summary',title:'Master Order List',icon:'📦',type:'summary'});
}

function key(pageId,matId){return pageId+'||'+matId;}
function getMat(pageId,matId){
  const k=key(pageId,matId);
  if(!state.materials[k]) state.materials[k]={qty:0,color:'',supplier:'',unitCost:0};
  return state.materials[k];
}
function getMisc(pageId){
  if(!state.misc[pageId]) state.misc[pageId]=[];
  return state.misc[pageId];
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPage(){
  const container=document.getElementById('pages-container');
  container.innerHTML='';
  const pg=pages[currentPage];
  document.getElementById('progress-fill').style.width=((currentPage+1)/pages.length*100)+'%';
  if(pg.type==='property') renderPropertyPage(container);
  else if(pg.type==='garage') renderGaragePage(container,pg);
  else if(pg.type==='materials') renderMaterialsPage(container,pg);
  else if(pg.type==='bedroom') renderBedroomPage(container,pg);
  else if(pg.type==='supplies') renderSuppliesPage(container,pg);
  else if(pg.type==='summary') renderSummaryPage(container);
  addNav(container);
  window.scrollTo({top:0,behavior:'smooth'});
}

function addNav(container){
  const nav=document.createElement('div');nav.className='nav-bar';
  const left=document.createElement('div');
  if(currentPage>0){const b=document.createElement('button');b.className='btn';b.textContent='← Back';b.onclick=()=>{saveCurrent();currentPage--;renderPage();};left.appendChild(b);}
  const mid=document.createElement('div');mid.className='step-indicator';mid.textContent=(currentPage+1)+' of '+pages.length;
  const right=document.createElement('div');
  if(currentPage<pages.length-1){const b=document.createElement('button');b.className='btn primary';b.textContent='Next →';b.onclick=()=>{saveCurrent();if(currentPage===0){savePropertyPage();buildPages();}currentPage++;renderPage();};right.appendChild(b);}
  nav.appendChild(left);nav.appendChild(mid);nav.appendChild(right);
  container.appendChild(nav);
}

// Paint coverage: 1 gal covers ~350 sq ft per coat, assume 2 coats walls + 1 coat ceiling
// Wall area = perimeter * height. We estimate perimeter as 4 * sqrt(sqft) * 1.15 (approx for typical room)
// Flooring: sqft + 10% waste factor
window.autoCalcRoom=function(pageId){
  const sqftEl=document.getElementById('room-sqft-'+pageId);
  const heightEl=document.getElementById('room-height-'+pageId);
  const calcsEl=document.getElementById('room-calcs-'+pageId);
  const sqft=parseFloat(sqftEl?sqftEl.value:0)||0;
  const height=parseFloat(heightEl?heightEl.value:0)||0;
  if(!calcsEl) return;

  if(!sqft&&!height){calcsEl.innerHTML='';return;}

  // Estimates
  const floorSqft=sqft>0?Math.ceil(sqft*1.1):0; // +10% waste
  const sideLen=sqft>0?Math.sqrt(sqft):0;
  const perim=sqft>0?sideLen*4*1.15:0;
  const wallArea=sqft>0&&height>0?Math.ceil(perim*height):0;
  const ceilArea=sqft>0?Math.ceil(sqft):0;
  const totalPaintArea=wallArea+ceilArea;
  const paintGals=totalPaintArea>0?Math.ceil(totalPaintArea/350*2):0; // 2 coats walls
  const primerGals=totalPaintArea>0?Math.ceil(totalPaintArea/400):0;  // 1 coat primer

  let html='';
  if(floorSqft>0) html+=`<span><b>${floorSqft} sq ft</b> flooring (w/ 10% waste)</span>`;
  if(wallArea>0) html+=`<span><b>~${wallArea} sq ft</b> wall area</span>`;
  if(ceilArea>0) html+=`<span><b>${ceilArea} sq ft</b> ceiling</span>`;
  if(paintGals>0) html+=`<span><b>~${paintGals} gal</b> paint (2 coats)</span>`;
  if(primerGals>0) html+=`<span><b>~${primerGals} gal</b> primer</span>`;
  calcsEl.innerHTML=html;

  // Auto-fill flooring quantities if empty
  const floorIds=['bd-lvp','bd-carpet','bd-floor-resist','bd-carpet-pad',
    'k-lvp','k-carpet','k-floor-resist','k-carpet-pad',
    'gar-lvp','gar-floor-resist','gar-epoxy',
    'gen-lvp','gen-carpet','gen-floor-resist','gen-carpet-pad'];
  floorIds.forEach(fid=>{
    const qEl=document.getElementById('qty-'+pageId+'-'+fid);
    if(qEl&&(!qEl.value||qEl.value==='0')&&floorSqft>0){
      qEl.value=floorSqft;
      const saved=getMat(pageId,fid);
      saved.qty=floorSqft;
    }
  });

  // Auto-fill paint quantities if empty
  const paintMap={
    'bd-paint':paintGals,'bd-primer':primerGals,
    'gar-paint':paintGals,'gar-primer':primerGals,
    'paint-int':paintGals,'primer':primerGals,
    'k-paint':paintGals,
  };
  Object.entries(paintMap).forEach(([fid,qty])=>{
    const qEl=document.getElementById('qty-'+pageId+'-'+fid);
    if(qEl&&(!qEl.value||qEl.value==='0')&&qty>0){
      qEl.value=qty;
      const saved=getMat(pageId,fid);
      saved.qty=qty;
    }
  });
};

function buildMatTable(pageId,mats,inCard=false){
  const wrap=document.createElement('div');
  if(!inCard){wrap.className='room-card';}
  const tbl=document.createElement('table');tbl.className='mat-table';tbl.innerHTML=`<thead><tr><th>Material</th><th>Qty</th><th>Unit</th><th>Supplier</th><th>Unit $</th></tr></thead>`;
  const tbody=document.createElement('tbody');

  // Build a map of bundle parent ids for quick lookup
  const bundleParents={};
  mats.forEach(m=>{if(m.bundle) bundleParents[m.bundle]=m.id;});

  mats.forEach(mat=>{
    const saved=getMat(pageId,mat.id);
    if(!saved.supplier) saved.supplier=mat.sup;
    if(!saved.unitCost) saved.unitCost=mat.cost;

    const isBundleChild=!!mat.bundleChild;
    const tr=document.createElement('tr');
    tr.id=`tr-${pageId}-${mat.id}`;

    // Bundle children start hidden unless parent already has qty
    if(isBundleChild){
      const parentMatId=bundleParents[mat.bundleChild];
      const parentSaved=getMat(pageId,parentMatId||'');
      const parentHasQty=parentSaved&&parentSaved.qty>0;
      tr.style.display=parentHasQty?'':'none';
      tr.style.background='#b8cad4';
    }

    const indentStyle=isBundleChild?'padding-left:18px;color:#2a4a6a;font-size:12px;':'font-weight:500';
    const bundgeIcon=isBundleChild?'<span style="color:#4a7a9a;margin-right:4px">↳</span>':'';

    tr.innerHTML=`
      <td><div style="${indentStyle}">${bundgeIcon}${mat.name}</div>
        ${mat.unitSize>1&&!isBundleChild?`<span class="unit-tag">sold in ${mat.unitSize}s</span>`:''}
        ${mat.hasColor?`<input type="text" class="color-input" id="clr-${pageId}-${mat.id}" value="${saved.color||''}" placeholder="Color / style">` : ''}
        ${mat.hasNote?`<input type="text" class="color-input" id="note-${pageId}-${mat.id}" value="${saved.note||''}" placeholder="${mat.noteLabel||'Note'}">` : ''}</td>
      <td><input type="number" id="qty-${pageId}-${mat.id}" value="${saved.qty||''}" placeholder="0" min="0" step="1"></td>
      <td style="color:#2a4a6a;font-size:12px;text-align:center;white-space:nowrap">${mat.unit}</td>
      <td><select id="sup-${pageId}-${mat.id}">${SUPPLIERS.map(s=>`<option value="${s}"${saved.supplier===s?' selected':''}>${s}</option>`).join('')}</select></td>
      <td><input type="number" class="cost-input" id="cost-${pageId}-${mat.id}" value="${saved.unitCost||''}" placeholder="0.00" min="0" step="0.01"></td>`;

    // Live save on every input
    const liveSave=()=>{
      const saved2=getMat(pageId,mat.id);
      const qe=document.getElementById('qty-'+pageId+'-'+mat.id);
      const se=document.getElementById('sup-'+pageId+'-'+mat.id);
      const ce=document.getElementById('cost-'+pageId+'-'+mat.id);
      const cle=document.getElementById('clr-'+pageId+'-'+mat.id);
      const ne=document.getElementById('note-'+pageId+'-'+mat.id);
      if(qe) saved2.qty=parseFloat(qe.value)||0;
      if(se) saved2.supplier=se.value;
      if(ce) saved2.unitCost=parseFloat(ce.value)||0;
      if(cle) saved2.color=cle.value;
      if(ne) saved2.note=ne.value;
    };
    setTimeout(()=>{
      ['qty','sup','cost','clr','note'].forEach(prefix=>{
        const el=document.getElementById(prefix+'-'+pageId+'-'+mat.id);
        if(el) el.addEventListener('input',liveSave),el.addEventListener('change',liveSave);
      });
    },100);
    // If this is a bundle parent, wire up qty change to show/hide children
    if(mat.bundle){
      const bundleKey=mat.bundle;
      const childMats=mats.filter(m=>m.bundleChild===bundleKey);
      setTimeout(()=>{
        const qtyEl=document.getElementById('qty-'+pageId+'-'+mat.id);
        if(!qtyEl)return;
        const updateChildren=(qty)=>{
          childMats.forEach(cm=>{
            const childTr=document.getElementById('tr-'+pageId+'-'+cm.id);
            if(childTr) childTr.style.display=qty>0?'':'none';
            // Auto-set child qty to match parent if child is empty
            const childQtyEl=document.getElementById('qty-'+pageId+'-'+cm.id);
            if(childQtyEl&&qty>0&&(!childQtyEl.value||childQtyEl.value==='0')){
              childQtyEl.value=qty;
              getMat(pageId,cm.id).qty=qty;
            }
          });
        };
        qtyEl.addEventListener('input',e=>updateChildren(parseFloat(e.target.value)||0));
        // Run once on load
        updateChildren(parseFloat(qtyEl.value)||0);
      },50);
    }

    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  return wrap;
}

function renderSummaryPage(container){
  saveAllPages(); // ensure all data is captured before rendering
  const bySupplier={};
  let grandTotal=0;

  // Standard materials
  Object.entries(state.materials).forEach(([k,m])=>{
    if(!m.qty||m.qty<=0)return;
    const [pageId,...rest]=k.split('||');const matId=rest.join('||');
    const pg=pages.find(p=>p.id===pageId);
    const matDef=ALL_MATS.find(x=>x.id===matId);
    if(!matDef)return;
    const lineTotal=m.qty*m.unitCost;grandTotal+=lineTotal;
    const sup=m.supplier||'Other';
    if(!bySupplier[sup])bySupplier[sup]=[];
    const notePart=m.note?` [${m.note}]`:''; bySupplier[sup].push({name:matDef.name+(m.color?` — ${m.color}`:'')+notePart,room:pg?pg.title:'General',qty:m.qty,unit:matDef.unit,unitCost:m.unitCost,lineTotal});
  });

  // Supplies / consumables
  Object.entries(state.supplies||{}).forEach(([sid,s])=>{
    if(!s.qty||s.qty<=0) return;
    const itemDef=SUPPLIES_ITEMS.find(x=>x.id===sid);
    if(!itemDef) return;
    const lineTotal=s.qty*s.unitCost;grandTotal+=lineTotal;
    const sup=s.supplier||'Home Depot';
    if(!bySupplier[sup]) bySupplier[sup]=[];
    bySupplier[sup].push({name:itemDef.name,room:'Jobsite Supplies',qty:s.qty,unit:itemDef.unit,unitCost:s.unitCost,lineTotal});
  });

  // Misc
  Object.entries(state.misc).forEach(([pageId,items])=>{
    const pg=pages.find(p=>p.id===pageId);
    items.forEach(m=>{
      if(!m.qty||m.qty<=0||!m.name)return;
      const lineTotal=m.qty*(m.unitCost||0);grandTotal+=lineTotal;
      const sup=m.supplier||'Other';
      if(!bySupplier[sup])bySupplier[sup]=[];
      bySupplier[sup].push({name:m.name+' (misc)',room:pg?pg.title:'General',qty:m.qty,unit:m.unit||'units',unitCost:m.unitCost||0,lineTotal});
    });
  });

  const d=document.createElement('div');
  // Build room sqft display string
  const roomSqftParts=Object.entries(state.roomSqft||{}).filter(([,v])=>v>0).map(([pid,sq])=>{const pg=pages.find(p=>p.id===pid);const ht=state.roomHeight&&state.roomHeight[pid]?` / ${state.roomHeight[pid]}ft ceiling`:'';return pg?`${pg.title}: ${sq} sq ft${ht}`:null;}).filter(Boolean);
  const sqftNote=roomSqftParts.length?` | Room sizes: ${roomSqftParts.join(', ')}`:'';
  d.innerHTML=`<div class="page-title">📦 Master Order List — By Vendor</div>
  <div class="page-sub">${state.address||'Your property'}${sqftNote} — all items with qty > 0, grouped by supplier.</div>
  <div class="grand-total-bar"><div><div class="lbl">Estimated material total</div></div><div class="val">$${grandTotal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>`;

  if(!Object.keys(bySupplier).length){
    d.innerHTML+=`<div class="empty-msg">No materials entered yet — go back and add quantities.</div>`;
  } else {
    Object.entries(bySupplier).sort().forEach(([sup,items])=>{
      const supTotal=items.reduce((a,b)=>a+b.lineTotal,0);
      const block=document.createElement('div');block.className='supplier-block';
      block.innerHTML=`<div class="supplier-header"><span>📍 ${sup}</span><span class="supplier-total">$${supTotal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
        <div class="master-row hdr"><div>Material</div><div>Room</div><div>Qty</div><div style="text-align:right">Subtotal</div></div>
        ${items.map(i=>`<div class="master-row"><div>${i.name}</div><div style="color:#2a4a6a;font-size:12px">${i.room}</div><div>${i.qty} ${i.unit}</div><div style="text-align:right;font-weight:500">$${i.lineTotal.toFixed(2)}</div></div>`).join('')}`;
      d.appendChild(block);
    });
  }

  const expBar=document.createElement('div');expBar.className='export-bar';
  expBar.innerHTML=`
    <button class="btn primary" onclick="window.print()">🖨 Print Full Order / PDF</button>
    <button class="btn" onclick="copyList()">📋 Copy full list</button>
    <button class="btn" onclick="printByVendor()">📍 Print by vendor</button>`;
  d.appendChild(expBar);
  d.innerHTML+=`<div id="copy-confirm" style="font-size:12px;color:rgba(255,255,255,.9);margin-top:6px;display:none">Copied to clipboard!</div>`;
  container.appendChild(d);
}

window.copyList=function(){
  saveAllPages();
  const lines=['MASTER MATERIAL LIST','Property: '+(state.address||'—'),'Generated: '+new Date().toLocaleDateString(),''];
  const bySupplier={};
  Object.entries(state.materials).forEach(([k,m])=>{
    if(!m.qty||m.qty<=0)return;
    const [pageId,...rest]=k.split('||');const matId=rest.join('||');
    const pg=pages.find(p=>p.id===pageId);
    const matDef=ALL_MATS.find(x=>x.id===matId);if(!matDef)return;
    const sup=m.supplier||'Other';if(!bySupplier[sup])bySupplier[sup]=[];
    bySupplier[sup].push(`  ${matDef.name}${m.color?' ('+m.color+')':''} | ${pg?pg.title:''} | ${m.qty} ${matDef.unit} @ $${m.unitCost} = $${(m.qty*m.unitCost).toFixed(2)}`);
  });
  Object.entries(state.misc).forEach(([pageId,items])=>{
    const pg=pages.find(p=>p.id===pageId);
    items.forEach(m=>{if(!m.qty||!m.name)return;const sup=m.supplier||'Other';if(!bySupplier[sup])bySupplier[sup]=[];bySupplier[sup].push(`  ${m.name} (misc) | ${pg?pg.title:''} | ${m.qty} ${m.unit||'units'} @ $${m.unitCost||0} = $${((m.qty)*(m.unitCost||0)).toFixed(2)}`);});
  });
  Object.entries(bySupplier).sort().forEach(([sup,items])=>{lines.push('--- '+sup+' ---');lines.push(...items);lines.push('');});
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{const el=document.getElementById('copy-confirm');if(el){el.style.display='block';setTimeout(()=>el.style.display='none',2500);}});
};

window.printByVendor=function(){
  saveAllPages();
  const bySupplier={};
  let grandTotal=0;
  // Rebuild by supplier same as summary
  Object.entries(state.materials).forEach(([k,m])=>{
    if(!m.qty||m.qty<=0)return;
    const [pageId,...rest]=k.split('||');const matId=rest.join('||');
    const pg=pages.find(p=>p.id===pageId);
    const matDef=ALL_MATS.find(x=>x.id===matId);if(!matDef)return;
    const lineTotal=m.qty*m.unitCost;grandTotal+=lineTotal;
    const sup=m.supplier||'Other';if(!bySupplier[sup])bySupplier[sup]=[];
    bySupplier[sup].push({name:matDef.name+(m.color?' — '+m.color:'')+(m.note?' ['+m.note+']':''),room:pg?pg.title:'',qty:m.qty,unit:matDef.unit,unitCost:m.unitCost,lineTotal});
  });
  Object.entries(state.supplies||{}).forEach(([sid,s])=>{
    if(!s.qty||s.qty<=0)return;
    const itemDef=SUPPLIES_ITEMS.find(x=>x.id===sid);if(!itemDef)return;
    const lineTotal=s.qty*s.unitCost;grandTotal+=lineTotal;
    const sup=s.supplier||'Home Depot';if(!bySupplier[sup])bySupplier[sup]=[];
    bySupplier[sup].push({name:itemDef.name,room:'Jobsite Supplies',qty:s.qty,unit:itemDef.unit,unitCost:s.unitCost,lineTotal});
  });
  Object.entries(state.misc||{}).forEach(([pageId,items])=>{
    const pg=pages.find(p=>p.id===pageId);
    items.forEach(m=>{if(!m.qty||!m.name)return;const lineTotal=m.qty*(m.unitCost||0);grandTotal+=lineTotal;const sup=m.supplier||'Other';if(!bySupplier[sup])bySupplier[sup]=[];bySupplier[sup].push({name:m.name+' (misc)',room:pg?pg.title:'',qty:m.qty,unit:m.unit||'units',unitCost:m.unitCost||0,lineTotal});});
  });

  const addr=state.address||'Property';
  const date=new Date().toLocaleDateString();
  let html=`<!DOCTYPE html><html><head><title>Vendor Orders — ${addr}</title>
  <style>
    body{font-family:-apple-system,sans-serif;font-size:13px;color:#1a1a1a;padding:1rem}
    h1{font-size:18px;margin-bottom:4px}
    .subtitle{font-size:12px;color:#888;margin-bottom:1.5rem}
    .vendor{page-break-inside:avoid;margin-bottom:2rem;border:1px solid #ddd;border-radius:8px;overflow:hidden}
    .vendor-header{background:#1b4f72;color:#fff;padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center}
    .vendor-name{font-size:15px;font-weight:600}
    .vendor-total{font-size:14px}
    table{width:100%;border-collapse:collapse}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:6px 10px;background:#f5f5f5;text-align:left;border-bottom:1px solid #ddd}
    td{padding:6px 10px;border-bottom:1px solid #f0f0f0;font-size:13px}
    tr:last-child td{border-bottom:none}
    .grand{font-size:15px;font-weight:600;margin-top:1rem;text-align:right;padding:.5rem}
    @media print{button{display:none}.vendor{page-break-inside:avoid}}
  </style></head><body>
  <button onclick="window.print()" style="margin-bottom:1rem;padding:7px 16px;cursor:pointer;background:#1b4f72;color:#fff;border:none;border-radius:6px;font-size:13px">🖨 Print All Vendor Orders</button>
  <h1>M.N. Teas Investment — Material Orders</h1>
  <div class="subtitle">${addr} &nbsp;|&nbsp; Generated ${date} &nbsp;|&nbsp; Grand Total: $${grandTotal.toLocaleString('en-US',{minimumFractionDigits:2})}</div>`;

  Object.entries(bySupplier).sort().forEach(([sup,items])=>{
    const supTotal=items.reduce((a,b)=>a+b.lineTotal,0);
    html+=`<div class="vendor">
      <div class="vendor-header"><span class="vendor-name">📍 ${sup}</span><span class="vendor-total">Order Total: $${supTotal.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
      <table><thead><tr><th>Item</th><th>Room / Area</th><th>Qty</th><th>Unit</th><th>Unit $</th><th>Subtotal</th></tr></thead><tbody>
      ${items.map(i=>`<tr><td>${i.name}</td><td style="color:#888">${i.room}</td><td>${i.qty}</td><td>${i.unit}</td><td>$${i.unitCost.toFixed(2)}</td><td style="font-weight:500">$${i.lineTotal.toFixed(2)}</td></tr>`).join('')}
      </tbody></table></div>`;
  });
  html+=`<div class="grand">Grand Total: $${grandTotal.toLocaleString('en-US',{minimumFractionDigits:2})}</div></body></html>`;

  const win=window.open('','_blank');
  if(win){win.document.write(html);win.document.close();}
};
